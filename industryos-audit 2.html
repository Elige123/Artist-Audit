<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IndustryOS Artist Audit</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: #f5f5f5;
    color: #111;
    min-height: 100vh;
    padding: 40px 16px 80px;
  }
  .card {
    background: #fff;
    max-width: 620px;
    margin: 0 auto;
    border-radius: 12px;
    box-shadow: 0 2px 16px rgba(0,0,0,0.08);
    overflow: hidden;
  }
  .header {
    background: #111;
    color: #fff;
    padding: 36px 36px 28px;
  }
  .header .eyebrow {
    font-size: 11px;
    letter-spacing: 0.2em;
    color: #00e87a;
    text-transform: uppercase;
    margin-bottom: 10px;
  }
  .header h1 { font-size: 28px; font-weight: 700; margin-bottom: 10px; }
  .header p { font-size: 14px; color: #aaa; line-height: 1.5; }

  .form-body { padding: 32px 36px; }

  .question { margin-bottom: 28px; }
  .question label {
    display: block;
    font-size: 15px;
    font-weight: 600;
    margin-bottom: 12px;
    line-height: 1.4;
  }
  .question .cat-tag {
    display: inline-block;
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: #00a855;
    background: #e8faf1;
    border-radius: 4px;
    padding: 2px 7px;
    margin-bottom: 8px;
  }
  .options { display: flex; flex-direction: column; gap: 8px; }
  .option {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 11px 14px;
    border: 1.5px solid #e5e5e5;
    border-radius: 8px;
    cursor: pointer;
    font-size: 14px;
    transition: border-color 0.15s, background 0.15s;
  }
  .option:hover { border-color: #00e87a; background: #f6fef9; }
  .option input[type=radio] { accent-color: #00a855; width: 16px; height: 16px; flex-shrink: 0; }

  hr { border: none; border-top: 1px solid #eee; margin: 4px 0 28px; }

  .name-row { display: flex; gap: 12px; margin-bottom: 28px; }
  .name-row input, .form-body input[type=text], .form-body input[type=email] {
    width: 100%;
    padding: 11px 14px;
    border: 1.5px solid #e5e5e5;
    border-radius: 8px;
    font-size: 14px;
    outline: none;
    transition: border-color 0.15s;
  }
  .name-row input:focus, .form-body input:focus { border-color: #00a855; }
  .field-label { font-size: 13px; font-weight: 600; margin-bottom: 6px; color: #444; display: block; }

  .submit-btn {
    width: 100%;
    background: #111;
    color: #fff;
    border: none;
    padding: 15px;
    font-size: 15px;
    font-weight: 700;
    letter-spacing: 0.05em;
    border-radius: 8px;
    cursor: pointer;
    margin-top: 8px;
    transition: background 0.15s;
  }
  .submit-btn:hover { background: #00a855; }

  /* Results */
  #results { display: none; padding: 36px; }
  .score-block {
    text-align: center;
    padding: 28px 0 24px;
    border-bottom: 1px solid #eee;
    margin-bottom: 28px;
  }
  .score-num {
    font-size: 72px;
    font-weight: 800;
    color: #111;
    line-height: 1;
  }
  .score-num span { font-size: 28px; color: #aaa; font-weight: 400; }
  .score-label { font-size: 13px; color: #888; margin-top: 6px; letter-spacing: 0.08em; text-transform: uppercase; }
  .verdict { font-size: 18px; font-weight: 700; margin-bottom: 6px; }
  .verdict-sub { font-size: 14px; color: #666; line-height: 1.5; }

  .breakdown-title {
    font-size: 11px; font-weight: 700; letter-spacing: 0.15em;
    text-transform: uppercase; color: #aaa; margin-bottom: 16px;
  }
  .cat-row { margin-bottom: 18px; }
  .cat-head { display: flex; justify-content: space-between; margin-bottom: 5px; }
  .cat-name { font-size: 13px; font-weight: 600; color: #333; }
  .cat-score { font-size: 13px; font-weight: 700; }
  .bar-track { height: 6px; background: #eee; border-radius: 3px; margin-bottom: 6px; }
  .bar-fill { height: 100%; border-radius: 3px; }
  .cat-tip { font-size: 12px; color: #888; line-height: 1.5; }

  .cta-box {
    margin-top: 28px;
    background: #111;
    border-radius: 10px;
    padding: 28px;
    text-align: center;
    color: #fff;
  }
  .cta-box h3 { font-size: 20px; margin-bottom: 8px; }
  .cta-box p { font-size: 13px; color: #aaa; margin-bottom: 20px; line-height: 1.5; }
  .cta-btn {
    display: inline-block;
    background: #00e87a;
    color: #111;
    font-weight: 700;
    font-size: 14px;
    padding: 12px 28px;
    border-radius: 6px;
    text-decoration: none;
    letter-spacing: 0.05em;
  }
  .retake {
    display: block;
    text-align: center;
    margin-top: 20px;
    font-size: 13px;
    color: #aaa;
    cursor: pointer;
    text-decoration: underline;
    background: none;
    border: none;
  }

  @media (max-width: 480px) {
    .header, .form-body, #results { padding-left: 20px; padding-right: 20px; }
    .name-row { flex-direction: column; }
  }
</style>
</head>
<body>

<div class="card">
  <div class="header">
    <div class="eyebrow">Free Artist Tool</div>
    <h1>The Artist Audit</h1>
    <p>8 quick questions. Find out exactly where your music career stands — and what to fix first.</p>
  </div>

  <div id="form-section">
    <div class="form-body">

      <!-- Name + Email -->
      <div class="name-row">
        <div style="flex:1">
          <label class="field-label">Your Name</label>
          <input type="text" id="name" placeholder="Artist name" />
        </div>
        <div style="flex:1">
          <label class="field-label">Email (optional)</label>
          <input type="email" id="email" placeholder="you@email.com" />
        </div>
      </div>

      <hr />

      <!-- Q1 -->
      <div class="question">
        <div class="cat-tag">Music Output</div>
        <label>1. How many songs have you officially released?</label>
        <div class="options">
          <label class="option"><input type="radio" name="q1" value="1"> 0–2</label>
          <label class="option"><input type="radio" name="q1" value="4"> 3–9</label>
          <label class="option"><input type="radio" name="q1" value="7"> 10–24</label>
          <label class="option"><input type="radio" name="q1" value="10"> 25+</label>
        </div>
      </div>

      <!-- Q2 -->
      <div class="question">
        <div class="cat-tag">Music Output</div>
        <label>2. How consistently do you release music?</label>
        <div class="options">
          <label class="option"><input type="radio" name="q2" value="1"> No real schedule</label>
          <label class="option"><input type="radio" name="q2" value="4"> A few times a year</label>
          <label class="option"><input type="radio" name="q2" value="7"> Monthly</label>
          <label class="option"><input type="radio" name="q2" value="10"> Every 2–4 weeks</label>
        </div>
      </div>

      <!-- Q3 -->
      <div class="question">
        <div class="cat-tag">Audience Growth</div>
        <label>3. How often do you post content online?</label>
        <div class="options">
          <label class="option"><input type="radio" name="q3" value="1"> Rarely / Never</label>
          <label class="option"><input type="radio" name="q3" value="3"> A few times a month</label>
          <label class="option"><input type="radio" name="q3" value="7"> A few times a week</label>
          <label class="option"><input type="radio" name="q3" value="10"> Daily</label>
        </div>
      </div>

      <!-- Q4 -->
      <div class="question">
        <div class="cat-tag">Audience Growth</div>
        <label>4. What are your monthly streams / listeners?</label>
        <div class="options">
          <label class="option"><input type="radio" name="q4" value="1"> Under 500</label>
          <label class="option"><input type="radio" name="q4" value="4"> 500–5K</label>
          <label class="option"><input type="radio" name="q4" value="7"> 5K–50K</label>
          <label class="option"><input type="radio" name="q4" value="10"> 50K+</label>
        </div>
      </div>

      <!-- Q5 -->
      <div class="question">
        <div class="cat-tag">Marketing System</div>
        <label>5. Do you have a structured release plan?</label>
        <div class="options">
          <label class="option"><input type="radio" name="q5" value="1"> No plan</label>
          <label class="option"><input type="radio" name="q5" value="3"> I figure it out as I go</label>
          <label class="option"><input type="radio" name="q5" value="6"> Basic plan (date + posts)</label>
          <label class="option"><input type="radio" name="q5" value="10"> Full campaign (pre-save, press, socials)</label>
        </div>
      </div>

      <!-- Q6 -->
      <div class="question">
        <div class="cat-tag">Marketing System</div>
        <label>6. Do you have a fan funnel to capture &amp; convert listeners?</label>
        <div class="options">
          <label class="option"><input type="radio" name="q6" value="1"> What's a fan funnel?</label>
          <label class="option"><input type="radio" name="q6" value="3"> Just social media links</label>
          <label class="option"><input type="radio" name="q6" value="6"> A link-in-bio page</label>
          <label class="option"><input type="radio" name="q6" value="10"> Email list, freebie, or community</label>
        </div>
      </div>

      <!-- Q7 -->
      <div class="question">
        <div class="cat-tag">Monetization</div>
        <label>7. How big is your email list?</label>
        <div class="options">
          <label class="option"><input type="radio" name="q7" value="1"> I don't have one</label>
          <label class="option"><input type="radio" name="q7" value="3"> Under 100</label>
          <label class="option"><input type="radio" name="q7" value="6"> 100–1,000</label>
          <label class="option"><input type="radio" name="q7" value="10"> 1,000+</label>
        </div>
      </div>

      <!-- Q8 -->
      <div class="question">
        <div class="cat-tag">Monetization</div>
        <label>8. How many revenue streams do you have from music?</label>
        <div class="options">
          <label class="option"><input type="radio" name="q8" value="1"> None yet</label>
          <label class="option"><input type="radio" name="q8" value="3"> Streaming only</label>
          <label class="option"><input type="radio" name="q8" value="7"> 2–3 streams (merch, live, sync)</label>
          <label class="option"><input type="radio" name="q8" value="10"> 4+ streams</label>
        </div>
      </div>

      <button class="submit-btn" onclick="submitAudit()">GET MY SCORE →</button>
    </div>
  </div>

  <!-- Results -->
  <div id="results"></div>
</div>

<script>
const categoryMap = {
  "Music Output":      ["q1","q2"],
  "Audience Growth":   ["q3","q4"],
  "Marketing System":  ["q5","q6"],
  "Monetization":      ["q7","q8"]
};

const tips = {
  "Music Output": {
    high: "Your output is strong — you're building a real catalog. Keep the cadence.",
    mid:  "Decent output, but consistency is your unlock. Listeners need to hear from you regularly.",
    low:  "More music = more chances to be discovered. Make releasing a priority."
  },
  "Audience Growth": {
    high: "You've got eyes on you. Now turn those listeners into real fans.",
    mid:  "You're growing, but content strategy could speed things up significantly.",
    low:  "Without audience growth, your music lives in a vacuum. Content is your pipeline."
  },
  "Marketing System": {
    high: "You're thinking like a label. Systems beat hustle every time.",
    mid:  "Your system has gaps. A consistent release strategy could 2x your results.",
    low:  "You're releasing music into the void. A system turns a drop into a moment."
  },
  "Monetization": {
    high: "Multiple income streams means music is a real business for you. Smart.",
    mid:  "You've started — now diversify before one stream dries up.",
    low:  "Monetization is the bridge between artist and career. Time to build it."
  }
};

const verdicts = [
  { min: 75, headline: "You're operating like a pro.", sub: "Your system is solid. IndustryOS can help you scale what's already working." },
  { min: 50, headline: "You've got talent, but the system is leaking.", sub: "Your music output is there — the infrastructure to grow it isn't yet. That's fixable." },
  { min: 30, headline: "Early stage, high potential.", sub: "You're building the foundation. The artists who win build systems before they need them." },
  { min: 0,  headline: "Right now, it's all music — no machine.", sub: "You're creating, which is the hardest part. Now it's time to build the system around your art." }
];

function barColor(score) {
  if (score >= 70) return "#00c95e";
  if (score >= 40) return "#f5a623";
  return "#e84040";
}

function submitAudit() {
  // Validate all answered
  for (let i = 1; i <= 8; i++) {
    if (!document.querySelector(`input[name="q${i}"]:checked`)) {
      alert("Please answer all 8 questions first.");
      return;
    }
  }

  const catScores = {};
  for (const [cat, qs] of Object.entries(categoryMap)) {
    const total = qs.reduce((sum, q) => sum + parseInt(document.querySelector(`input[name="${q}"]:checked`).value), 0);
    catScores[cat] = Math.round((total / (qs.length * 10)) * 100);
  }

  const weights = { "Music Output": 1.2, "Audience Growth": 1.0, "Marketing System": 1.3, "Monetization": 1.0 };
  let weighted = 0, totalW = 0;
  for (const [cat, score] of Object.entries(catScores)) {
    weighted += score * weights[cat];
    totalW += weights[cat];
  }
  const overall = Math.round(weighted / totalW);
  const verdict = verdicts.find(v => overall >= v.min);

  let breakdownHTML = "";
  for (const [cat, score] of Object.entries(catScores)) {
    const tip = score >= 70 ? tips[cat].high : score >= 40 ? tips[cat].mid : tips[cat].low;
    breakdownHTML += `
      <div class="cat-row">
        <div class="cat-head">
          <span class="cat-name">${cat}</span>
          <span class="cat-score" style="color:${barColor(score)}">${score}</span>
        </div>
        <div class="bar-track"><div class="bar-fill" style="width:${score}%;background:${barColor(score)}"></div></div>
        <div class="cat-tip">${tip}</div>
      </div>`;
  }

  document.getElementById("form-section").style.display = "none";
  const resultsEl = document.getElementById("results");
  resultsEl.style.display = "block";
  resultsEl.innerHTML = `
    <div class="score-block">
      <div class="score-num">${overall}<span>/100</span></div>
      <div class="score-label">Your IndustryOS Score</div>
    </div>
    <div class="verdict">${verdict.headline}</div>
    <p class="verdict-sub" style="margin-bottom:28px">${verdict.sub}</p>
    <div class="breakdown-title">Score Breakdown</div>
    ${breakdownHTML}
    <div class="cta-box">
      <h3>Want help building your system?</h3>
      <p>IndustryOS helps independent artists build the infrastructure behind their music — so your talent actually reaches people, and pays.</p>
      <a href="#apply" class="cta-btn">APPLY TO INDUSTRYOS →</a>
    </div>
    <button class="retake" onclick="retake()">↩ Retake the Audit</button>
  `;
  window.scrollTo({ top: 0, behavior: "smooth" });
}

function retake() {
  document.getElementById("form-section").style.display = "block";
  document.getElementById("results").style.display = "none";
  document.querySelectorAll("input[type=radio]").forEach(r => r.checked = false);
  window.scrollTo({ top: 0, behavior: "smooth" });
}
</script>
</body>
</html>
